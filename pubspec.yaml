name: teledesk

description: "Telegram bot admin panel for managing customer support chats"

publish_to: 'none'

version: 0.0.1+1

#homepage: https://github.com/

#repository: https://github.com/

#issue_tracker: https://github.com/

#funding:
#  - https://www.buymeacoffee.com/
#  - https://www.patreon.com/
#  - https://boosty.to/

#topics:
#  -
#  -

#platforms:
#  android:
#  ios:
#  linux:
#  macos:
#  web:
#  windows:

#screenshots:
#  - description: 'Screenshot 1'
#    path: screenshot_1.png

environment:
  sdk: '^3.10.1'
  flutter: "^3.38.3"

# https://dart.dev/tools/pub/workspaces
workspace:
  - packages/ui

dependencies:
  flutter:
    sdk: flutter

  flutter_web_plugins:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any
  intl_utils: ^2.8.14

  # Routing
  octopus: ^0.0.9

  # Annotation
  meta: ^1.17.0
  json_annotation: ^4.9.0

  # Utility
  collection: any
  async: any
  path: any
  convert: any
  path_provider: ^2.1.5
  platform_info: ^5.0.0
  #multiline: ^3.0.0
  rxdart: ^0.28.0
  url_launcher: ^6.3.1

  # Logger
  l: ^5.0.0

  # Desktop
  win32: ^5.11.0
  window_manager: ^0.5.1

  # State management
  control:
    git:
      url: https://github.com/PlugFox/control.git
      ref: master

  # Database
  shared_preferences: ^2.5.4
  drift: ^2.28.2
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.30

  freezed_annotation: ^3.1.0

  # Telegram
  telegram: ^1.0.0
  crypto: ^3.0.6

  # File handling
  file_picker: ^10.1.9
  image_picker: ^1.1.2

  # Media
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^19.0.0

  # Networking
  http: ^1.3.0
  #dio: ^5.4.2+1
  #dio_smart_retry: ^6.0.0

  # UI and Widgets
  cupertino_icons: ^1.0.8
  #google_fonts: ^6.2.1
  #font_awesome_flutter: ^10.7.0

  # Web
  web: ^1.1.0

  ui:
    path: ./packages/ui

dev_dependencies:
  # Unit & Widget tests for Flutter
  flutter_test:
    sdk: flutter
  # Integration tests for Flutter
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  test: any

  # Code generation
  build_runner: ^2.5.4
  drift_dev: ^2.30.0
  pubspec_generator: ^5.0.0
  flutter_gen_runner: ^5.9.0
  json_serializable: ^6.9.5
  # dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
  flutter_launcher_icons: ^0.14.3
  # dart run flutter_native_splash:create --path=flutter_native_splash.yaml
  flutter_native_splash: ^2.4.5
  freezed: ^3.1.0


flutter:
  generate: true
  uses-material-design: true

  shaders:
    - packages/ui/shaders/shimmer.frag

  assets:
    - assets/icons/

flutter_intl:
  enabled: true
  class_name: GeneratedLocalization
  main_locale: en
  arb_dir: lib/src/common/localization
  output_dir: lib/src/common/localization/generated
  use_deferred_loading: false

flutter_gen:
  output: lib/src/common/constant/
  line_length: 100